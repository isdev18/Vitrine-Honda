<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine Honda</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- SPLASH SCREEN -->
<div id="splash">
    <div class="splash-content">
        <img src="{{ url_for('static', filename='css/vendedor.jpg') }}" alt="Vendedor Honda">
        <h2>Ronaldhonda</h2>
        <p>O Nº 1 da Honda!</p>
        <div class="loader"></div>
    </div>
</div>

<!-- MENU HAMBÚRGUER -->
<header>
    <div class="menu-btn" id="menuBtn">☰</div>

    <nav class="menu" id="menu">
        <a href="#">Home</a>
        <a href="#">Modelos</a>
        <a href="#">Promoções</a>
        <a href="#">Contato</a>
        <a href="/admin">Painel ADM</a>
    </nav>
</header>

<!-- CABEÇALHO -->
<div class="header">
    <h1>Vitrine Honda</h1>
    <p>Ronaldhonda — O Brabo das Vendas!</p>
</div>

<!-- BUSCA -->
<div class="search-bar">
    <div class="search-box">
        <i class="fas fa-motorcycle"></i>
        <input type="text" id="searchInput" placeholder="Pesquisar motos...">
    </div>
</div>

<!-- CARROSSEL -->
<div class="carousel-wrapper">
    <div class="carousel-container" id="carouselContainer">
        <div class="carousel-track" id="carouselTrack">

            <div class="carousel-item">
                <img src="{{ url_for('static', filename='css/XRE.jpg') }}" alt="Honda XRE 300">
            </div>

            <div class="carousel-item">
                <img src="{{ url_for('static', filename='css/fan.jpg') }}" alt="Honda CG 160 Fan">
            </div>

            <div class="carousel-item">
                <img src="{{ url_for('static', filename='css/bros.jpg') }}" alt="Honda Bros 160">
            </div>

            <div class="carousel-item">
                <img src="{{ url_for('static', filename='css/pcx.jpg') }}" alt="Honda PCX 150">
            </div>

            <div class="carousel-item">
                <img src="{{ url_for('static', filename='css/twister.jpg') }}" alt="Honda CB 300F">
            </div>

        </div>
    </div>

    <div class="carousel-indicators" id="carouselIndicators"></div>
</div>

<!-- GRID DOS PRODUTOS -->
<div class="grid" id="products">
    <!-- Gerado pelo app.js -->
</div>

<!-- MODAL (ESTRUTURA CORRETA) -->
<div class="modal" id="modal" style="display:none;">
    <div class="modal-content">
        <span class="close" id="closeModal">&times;</span>
        <img id="modalImg">
        <h2 id="modalTitle"></h2>
        <p id="modalDesc"></p>
    </div>
</div>

<!-- SCRIPTS (ORDEM SEGURA) -->
<script src="/static/js/data.js"></script>
<script src="/static/js/app.js"></script>
<script src="/static/js/carousel-enhanced.js"></script>

<!-- Splash remove automático -->
<script>
window.addEventListener("load", () => {
    const splash = document.getElementById("splash");
    if (!splash) return;

    splash.style.transition = "opacity 0.6s ease";

    setTimeout(() => {
        splash.style.opacity = "0";
    }, 3000); // ⏱️ 3 segundos visível

    setTimeout(() => {
        splash.remove();
    }, 3600); // 3s + 0.6s do fade
});
</script>

<footer class="footer">
    <div class="footer-content">
        <h3><i class="fas fa-motorcycle"></i> Vitrine Honda</h3>
        <p>Aciona o 01 da Honda!</p>

        <div class="footer-links">
            <a href="#">Política de Privacidade</a>
            <a href="#">Termos de Uso</a>
            <a href="#">Contato</a>
        </div>

        <div class="social">
            <a href="https://www.instagram.com/ronalld_honda/"><i class="fab fa-instagram"></i></a>
            <a href="https://api.whatsapp.com/send?phone=5575998646978
"><i class="fab fa-whatsapp"></i></a>
       
        </div>

        <p class="copy">
            &copy; 2025 Vitrine Ronaldhonda — Todos os direitos reservados.
        </p>
    </div>
</footer>

</body>
</html>
